spring:
  application:
    name: cofrinho-api
  datasource:
    url: jdbc:postgresql://localhost:5432/cofrinho_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
